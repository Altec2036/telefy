name: Feature Request
description: Suggest an enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: Explain the current pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your idea
      placeholder: What should be added/changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternatives you considered?

  - type: textarea
    id: impact
    attributes:
      label: Impact and Scope
      description: API/UI/performance impact, breaking changes, migrations
      placeholder: e.g. Adds new field in /portfolio response
