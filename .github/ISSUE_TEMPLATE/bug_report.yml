name: Bug Report
description: Report a bug or regression
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to ...
        2. Enter address ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happens instead?
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser / OS / network / commit hash if known
      placeholder: Chrome 123, Ubuntu, commit abc123

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Add console/network logs or screenshots if available
